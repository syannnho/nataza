<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
<title>Detail ID – LAPAK ID</title>
<link rel="icon" type="image/png" href="https://files.catbox.moe/eeimlh.png"/>
<meta property="og:title" content="Detail ID – LAPAK ID"/>
<meta property="og:image" content="https://files.catbox.moe/eeimlh.png"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0e0e1a;color:#e8e8f5;font-family:'Exo 2',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#0e0e1a}::-webkit-scrollbar-thumb{background:#7b2fff;border-radius:2px}

#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* TOP NAV */
#topnav{flex-shrink:0;background:rgba(14,14,26,.96);backdrop-filter:blur(16px);border-bottom:1px solid #232338;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:50}
.logo{display:flex;align-items:center;gap:0}
.logo-mark{width:40px;height:40px;border-radius:10px;overflow:hidden}
.logo-mark img{width:100%;height:100%;object-fit:cover}
.nav-r{display:flex;align-items:center;gap:8px}
.nav-icon{position:relative;background:rgba(123,47,255,.1);border:1px solid rgba(123,47,255,.2);width:34px;height:34px;border-radius:9px;display:grid;place-items:center;cursor:pointer}
.nav-icon:hover{background:rgba(123,47,255,.2)}
.nav-icon svg{color:#a06bff;width:16px;height:16px}
.notif-badge{position:absolute;top:-4px;right:-4px;min-width:15px;height:15px;background:#ef4444;border-radius:99px;border:2px solid #0e0e1a;display:none;align-items:center;justify-content:center;font-size:.44rem;font-weight:800;color:#fff;padding:0 2px}
.notif-badge.show{display:flex}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:6px;padding:12px 16px 4px;font-size:12px;color:#6060a0;flex-shrink:0}
.breadcrumb a{color:#6060a0;text-decoration:none}
.breadcrumb a:hover{color:#e8e8f5}
.breadcrumb .active{color:#a06bff;font-weight:700}
.breadcrumb .sep{font-size:10px;opacity:.5}

/* SCROLL AREA */
#scrollarea{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* WRAPPER */
.wrap{padding:12px 16px;display:flex;flex-direction:column;gap:12px}

/* LOADING */
.loading-state{text-align:center;padding:60px 20px;color:#6060a0}
.loading-spinner{width:40px;height:40px;border:3px solid #232338;border-top-color:#7b2fff;border-radius:50%;margin:0 auto 12px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{color:#ef4444;text-align:center;padding:40px}

/* MAIN CARD */
.main-card{background:#181826;border:1px solid #232338;border-radius:16px;overflow:hidden;animation:fadeUp .4s ease both}
.main-top{display:flex;gap:0}
.main-left{flex:1.2;padding:16px;border-right:1px solid #232338}
.badge-tier{display:inline-block;font-size:10px;font-weight:800;letter-spacing:1px;padding:3px 10px;border-radius:6px;margin-bottom:10px;text-transform:uppercase}
.tier-low{background:rgba(192,192,192,.15);color:#c0c0c0;border:1px solid rgba(192,192,192,.2)}
.tier-medium{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.2)}
.tier-high{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.tier-legend{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.account-id{font-size:22px;font-weight:900;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.copy-btn{background:rgba(123,47,255,.15);border:1px solid rgba(123,47,255,.3);border-radius:6px;color:#a06bff;cursor:pointer;padding:3px 7px;font-size:11px;font-weight:700;transition:background .2s}
.copy-btn:hover{background:rgba(123,47,255,.3)}
.info-list{display:flex;flex-direction:column;gap:10px}
.info-row{display:flex;align-items:center;gap:8px;font-size:13px}
.info-row .icon-wrap{width:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#a06bff}
.info-row .label{color:#6060a0;font-size:12px;flex:1}
.info-row .value{font-weight:700;font-size:13px;text-align:right}
.rank-icon{width:20px;height:20px;object-fit:contain}
.rank-master{color:#f5c842}
.rank-heroic{color:#ff6b6b}

/* SISI KANAN - TOMBOL BAGIKAN */
.main-right{flex:0.5;padding:16px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.btn-share{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(123,47,255,.15);border:1.5px solid rgba(123,47,255,.3);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;font-family:'Rajdhani',sans-serif;color:#a06bff;cursor:pointer;transition:all .2s;width:100%}
.btn-share:hover{background:rgba(123,47,255,.25);border-color:#a06bff;transform:translateY(-1px)}
.btn-share svg{width:18px;height:18px}

/* SECTION CARD */
.section-card{background:#181826;border:1px solid #232338;border-radius:16px;padding:16px;animation:fadeUp .45s ease both}
.section-title{font-size:15px;font-weight:800;font-family:'Rajdhani',sans-serif;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid #232338;border-radius:12px;overflow:hidden}
.stat-cell{padding:12px 8px;text-align:center;border-right:1px solid #232338}
.stat-cell:last-child{border-right:none}
.stat-label{font-size:11px;color:#6060a0;margin-bottom:6px}
.stat-value{display:flex;align-items:center;justify-content:center;gap:5px;font-size:15px;font-weight:800;color:#a06bff;font-family:'Rajdhani',sans-serif}
.desc-text{font-size:13.5px;line-height:1.7;color:rgba(232,232,240,.75)}
.guarantee-list{display:flex;flex-direction:column;gap:12px}
.guarantee-item{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;line-height:1.5;color:#e8e8f5}
.guarantee-item svg{color:#22bb72;flex-shrink:0;margin-top:2px}
.note-card{background:rgba(123,47,255,.07);border:1px solid rgba(123,47,255,.2);border-radius:16px;padding:14px 16px;display:flex;gap:10px;align-items:flex-start}
.note-card svg{color:#a06bff;flex-shrink:0;margin-top:2px}
.note-title{font-size:13px;font-weight:800;margin-bottom:6px;color:#a06bff}
.note-text{font-size:12px;color:rgba(232,232,240,.7);line-height:1.6}

/* BOTTOM BAR */
.bottom-bar-outer{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(14,14,26,.92);backdrop-filter:blur(14px);border-top:1px solid #232338}
.bottom-bar-inner{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:16px}
.bottom-price{font-size:22px;font-weight:900;font-family:'Rajdhani',sans-serif;color:#a06bff;white-space:nowrap}
.btn-cart-bottom{display:flex;align-items:center;justify-content:center;background:transparent;color:#e8e8f5;border:1.5px solid #232338;border-radius:14px;width:48px;height:48px;flex-shrink:0;cursor:pointer;transition:all .2s}
.btn-cart-bottom:hover{border-color:#a06bff;background:rgba(123,47,255,.1)}
.btn-bottom{display:flex;align-items:center;justify-content:center;gap:8px;background:#7b2fff;color:#fff;border:none;border-radius:14px;padding:13px 22px;font-size:14px;font-weight:800;font-family:'Rajdhani',sans-serif;cursor:pointer;flex:1;transition:background .2s;box-shadow:0 4px 18px rgba(123,47,255,.4)}
.btn-bottom:hover{background:#5a1fd1}
.btn-bottom:disabled{opacity:0.5;cursor:not-allowed}

/* BOTTOM NAV */
#botnav{flex-shrink:0;background:rgba(14,14,26,.97);backdrop-filter:blur(16px);border-top:1px solid #1a1a2e;display:flex;justify-content:space-around;padding:7px 0 calc(7px + env(safe-area-inset-bottom));z-index:50}
.bni{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.58rem;color:#4040a0;cursor:pointer;padding:4px 8px;border-radius:9px;transition:.18s;text-decoration:none}
.bni:hover{color:#a06bff;background:rgba(123,47,255,.07)}
.bni.active{color:#a06bff}
.bni svg{width:19px;height:19px}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(34,187,114,.15);border:1px solid #22bb72;color:#22bb72;font-size:13px;font-weight:700;padding:9px 20px;border-radius:50px;opacity:0;pointer-events:none;transition:.25s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.warn{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@media (max-width:380px){
  .account-id{font-size:18px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .stat-cell:nth-child(2){border-right:none}
  .stat-cell:nth-child(3){border-top:1px solid #232338;border-right:1px solid #232338}
  .main-top{flex-direction:column}
  .main-left{border-right:none;border-bottom:1px solid #232338}
}
</style>
</head>
<body>
<div id="app">

<!-- TOP NAV -->

<script>
const API = '/api';
let currentIdData = null;
let settings = { prices: {} };
let likedSet = new Set(JSON.parse(localStorage.getItem('lapakid_liked') || '[]'));

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'rgba(239,68,68,.15)' : 'rgba(34,187,114,.15)';
  t.style.borderColor = isError ? '#ef4444' : '#22bb72';
  t.style.color = isError ? '#ef4444' : '#22bb72';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function formatRupiah(num) {
  return 'Rp ' + Number(num).toLocaleString('id-ID');
}

function getTierClass(tier) {
  const map = { low: 'tier-low', medium: 'tier-medium', high: 'tier-high', legend: 'tier-legend' };
  return map[tier] || 'tier-low';
}

function getTierName(tier) {
  const map = { low: 'Low', medium: 'Medium', high: 'High', legend: 'Legend' };
  return map[tier] || 'Low';
}

function getPrice(id) {
  if (id.price != null && id.price > 0) return id.price;
  if (settings.prices && settings.prices[id.tier]) return settings.prices[id.tier];
  return 0;
}

async function loadSettings() {
  try {
    const res = await fetch(`${API}/settings`);
    if (res.ok) {
      const data = await res.json();
      settings = data.data || {};
    }
  } catch (e) { console.warn(e); }
}

async function loadIdDetail() {
  const urlParams = new URLSearchParams(window.location.search);
  const idNumber = urlParams.get('id');
  
  if (!idNumber) {
    document.getElementById('mainContent').innerHTML = '<div class="error-msg">❌ Tidak ada ID yang dipilih</div>';
    document.getElementById('bottomBar').style.display = 'none';
    return;
  }

  document.getElementById('breadcrumbId').textContent = idNumber;

  try {
    const res = await fetch(`${API}/ids/${encodeURIComponent(idNumber)}`);
    if (!res.ok) {
      if (res.status === 404) throw new Error('ID tidak ditemukan');
      throw new Error('Gagal memuat data');
    }
    const data = await res.json();
    currentIdData = data.data;
    renderDetail();
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `<div class="error-msg">❌ ${err.message}</div>`;
    document.getElementById('bottomBar').style.display = 'none';
  }
}

function renderDetail() {
  if (!currentIdData) return;

  const id = currentIdData;
  const price = getPrice(id);
  const priceFormatted = formatRupiah(price);
  const tierClass = getTierClass(id.tier);
  const tierName = getTierName(id.tier);
  const isSold = id.sold || false;
  const createdAt = id.addedAt ? new Date(id.addedAt).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' }) : '—';
  const description = id.description || 'ID premium dengan id cantik dan rapih. Akun dijamin aman, siap bind email &amp; lainnya.';
  const nickname = id.name || 'N4TAZAXXX';
  
  const stats = {
    likes: id.likes || 0,
    characters: id.characters || 0,
    level: id.level || 0,
    season: id.season || 0
  };

  const html = `
    <div class="main-card">
      <div class="main-top">
        <div class="main-left">
          <span class="badge-tier ${tierClass}">${tierName}</span>
          <div class="account-id">
            ${id.number}
            <button class="copy-btn" onclick="copyID()" title="Salin ID">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
          </div>
          <div class="info-list">
            <div class="info-row">
              <span class="icon-wrap"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
              <span class="label">Region</span>
              <span class="value">${id.region || 'Indonesia'}</span>
            </div>
            <div class="info-row">
              <span class="icon-wrap"><img src="https://files.catbox.moe/5pkqv0.png" alt="BR Rank" class="rank-icon"></span>
              <span class="label">BR Rank</span>
              <span class="value">${id.brRank || 'Bronze'}</span>
            </div>
            <div class="info-row">
              <span class="icon-wrap"><img src="https://files.catbox.moe/5pkqv0.png" alt="CS Rank" class="rank-icon"></span>
              <span class="label">CS Rank</span>
              <span class="value">${id.csRank || 'Bronze'}</span>
            </div>
            <div class="info-row">
              <span class="icon-wrap"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
              <span class="label">Nickname</span>
              <span class="value">${nickname}</span>
            </div>
            <div class="info-row">
              <span class="icon-wrap"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
              <span class="label">Garansi</span>
              <span class="value" style="color:#22bb72">Aktif</span>
            </div>
            <div class="info-row">
              <span class="icon-wrap"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>
              <span class="label">Status</span>
              <span class="value" style="color:#22bb72">Deactive</span>
            </div>
          </div>
        </div>
        <div class="main-right">
          <button class="btn-share" onclick="bagikanID()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
              <polyline points="16 6 12 2 8 6"/>
              <line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
            Bagikan ID
          </button>
        </div>
      </div>
    </div>

    <div class="section-card">
      <p class="section-title">Informasi Akun</p>
      <div class="stats-grid">
        <div class="stat-cell">
          <p class="stat-label">Likes</p>
          <div class="stat-value">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
            ${stats.likes.toLocaleString()}
          </div>
        </div>
        <div class="stat-cell">
          <p class="stat-label">Karakter</p>
          <div class="stat-value">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            ${stats.characters}
          </div>
        </div>
        <div class="stat-cell">
          <p class="stat-label">Level Akun</p>
          <div class="stat-value">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            ${stats.level}
          </div>
        </div>
        <div class="stat-cell">
          <p class="stat-label">Season</p>
          <div class="stat-value">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${stats.season}
          </div>
        </div>
      </div>
    </div>

    <div class="section-card">
      <p class="section-title">Deskripsi</p>
      <p class="desc-text">${description}</p>
    </div>

    <div class="section-card">
      <p class="section-title">Garansi</p>
      <div class="guarantee-list">
        <div class="guarantee-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Garansi ganti akun / ID jika ID berbeda
        </div>
        <div class="guarantee-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Garansi ganti akun / ID jika region yang dibeli berbeda
        </div>
        <div class="guarantee-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Garansi uang kembali jika ID tidak dapat diproses
        </div>
      </div>
    </div>

    <div class="note-card">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <div>
        <p class="note-title">Catatan Penting</p>
        <p class="note-text">Setelah melakukan pembayaran, Admin akan mengirimkan data ID ke nomor yang akan Anda input di payment. Usahakan nomor aktif dan bisa dihubungi.</p>
      </div>
    </div>
  `;

  document.getElementById('mainContent').innerHTML = html;
  document.getElementById('bottomPrice').textContent = priceFormatted;
  document.getElementById('bottomBar').style.display = 'block';
  
  if (isSold) {
    document.getElementById('buyBtn').disabled = true;
    document.getElementById('cartBtn').disabled = true;
    document.getElementById('buyBtn').style.opacity = '0.5';
    document.getElementById('cartBtn').style.opacity = '0.5';
  }
  
  loadNotifications();
}

function copyID() {
  if (!currentIdData) return;
  navigator.clipboard.writeText(currentIdData.number).then(() => {
    showToast('✓ ID berhasil disalin!');
  }).catch(() => {
    showToast('ID: ' + currentIdData.number);
  });
}

function bagikanID() {
  if (!currentIdData) return;
  const price = getPrice(currentIdData);
  const shareData = {
    title: 'LAPAK ID - ID Premium Free Fire',
    text: `ID Free Fire Premium: ${currentIdData.number} | Nickname: ${currentIdData.name || 'N4TAZAXXX'} | Harga: ${formatRupiah(price)}`,
    url: window.location.href
  };

  if (navigator.share) {
    navigator.share(shareData)
      .then(() => showToast('✓ Berhasil membagikan ID'))
      .catch((err) => {
        if (err.name !== 'AbortError') {
          showToast('Gagal membagikan', true);
        }
      });
  } else {
    const shareText = `${shareData.text}\n\nLihat detail: ${shareData.url}`;
    navigator.clipboard.writeText(shareText).then(() => {
      showToast('✓ Link dan info ID disalin! Silakan bagikan manual.');
    }).catch(() => {
      showToast('ID: ' + currentIdData.number, true);
    });
  }
}

function beliSekarang() {
  if (!currentIdData) return;
  if (currentIdData.sold) {
    showToast('❌ ID ini sudah terjual!', true);
    return;
  }
  showToast('🛒 Menuju halaman pembayaran...');
  setTimeout(() => {
    window.location.href = `payment.html?id=${encodeURIComponent(currentIdData.number)}`;
  }, 500);
}

function tambahKeKeranjang() {
  if (!currentIdData) return;
  if (currentIdData.sold) {
    showToast('❌ ID ini sudah terjual!', true);
    return;
  }
  let cart = JSON.parse(localStorage.getItem('lapakid_cart') || '[]');
  if (cart.some(item => item.number === currentIdData.number)) {
    showToast('⚠️ ID sudah ada di keranjang', true);
    return;
  }
  cart.push({
    number: currentIdData.number,
    tier: currentIdData.tier,
    price: getPrice(currentIdData),
    name: currentIdData.name || currentIdData.number
  });
  localStorage.setItem('lapakid_cart', JSON.stringify(cart));
  showToast('✓ Ditambahkan ke keranjang!');
}

async function loadNotifications() {
  try {
    const r = await fetch(`${API}/notifications?limit=1`);
    if (!r.ok) return;
    const d = await r.json();
    const badge = document.getElementById('notifBadge');
    if (d.unread > 0) {
      badge.textContent = d.unread > 99 ? '99+' : String(d.unread);
      badge.classList.add('show');
    } else {
      badge.classList.remove('show');
    }
  } catch (e) {}
}

document.getElementById('notifBtn').addEventListener('click', () => {
  showToast('🔔 Belum ada notifikasi baru');
});

async function init() {
  await loadSettings();
  await loadIdDetail();
  setInterval(loadNotifications, 30000);
}
init();
</script>
