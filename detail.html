<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
<title>Detail ID – LAPAK ID</title>
<link rel="icon" type="image/png" href="https://files.catbox.moe/eeimlh.png"/>
<meta property="og:title" content="Detail ID – LAPAK ID"/>
<meta property="og:image" content="https://files.catbox.moe/eeimlh.png"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0b0b16;color:#fff;font-family:'Exo 2',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#0b0b16}::-webkit-scrollbar-thumb{background:#7b2fff;border-radius:99px}

#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;background:radial-gradient(circle at top right,rgba(123,47,255,.18),transparent 35%),#0b0b16}

/* TOP NAV */
#topnav{flex-shrink:0;background:rgba(14,14,26,.96);backdrop-filter:blur(16px);border-bottom:1px solid #232338;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:50}
.logo{display:flex;align-items:center;gap:0}
.logo-mark{width:40px;height:40px;border-radius:10px;overflow:hidden}
.logo-mark img{width:100%;height:100%;object-fit:cover}
.nav-r{display:flex;align-items:center;gap:8px}
.nav-icon{position:relative;background:rgba(123,47,255,.1);border:1px solid rgba(123,47,255,.2);width:34px;height:34px;border-radius:9px;display:grid;place-items:center;cursor:pointer;transition:.2s}
.nav-icon:hover{background:rgba(123,47,255,.2)}
.nav-icon svg{color:#a06bff;width:16px;height:16px}
.notif-badge{position:absolute;top:-4px;right:-4px;min-width:15px;height:15px;background:#ef4444;border-radius:99px;border:2px solid #0b0b16;display:none;align-items:center;justify-content:center;font-size:.44rem;font-weight:800;color:#fff;padding:0 2px}
.notif-badge.show{display:flex}

/* NOTIF PANEL */
.notif-panel{position:absolute;top:54px;right:12px;width:280px;max-height:320px;background:#181826;border:1px solid #232338;border-radius:13px;box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:200;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-6px) scale(.97);transition:.2s}
.notif-panel.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
.notif-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #1a1a2e}
.notif-head-title{font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700}
.notif-mark{font-size:.6rem;color:#7b2fff;cursor:pointer;background:none;border:none}
.notif-list{overflow-y:auto;max-height:260px}
.notif-item{padding:9px 12px;border-bottom:1px solid #1a1a2e;display:flex;gap:8px;cursor:pointer}
.notif-item:hover{background:#1e1e30}
.notif-item.unread{background:rgba(123,47,255,.05)}
.notif-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(16,185,129,.12);color:#10b981}
.notif-ico svg{width:12px;height:12px}
.notif-msg{font-size:.62rem;color:#e8e8f5;line-height:1.4}
.notif-time{font-size:.54rem;color:#6060a0;margin-top:2px}
.notif-empty{text-align:center;padding:20px;color:#6060a0;font-size:.7rem}

/* NOTIF DETAIL */
.nd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.nd-overlay.open{opacity:1;pointer-events:all}
.nd-box{background:#181826;border:1px solid #232338;border-radius:16px;max-width:340px;width:90%;padding:20px;transform:scale(.94);transition:.22s}
.nd-overlay.open .nd-box{transform:scale(1)}
.modal-close{background:rgba(123,47,255,.1);border:1px solid rgba(123,47,255,.2);width:26px;height:26px;border-radius:7px;display:grid;place-items:center;cursor:pointer;color:#a06bff}
.modal-close svg{width:12px;height:12px}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:6px;padding:12px 16px 4px;font-size:12px;color:#6060a0;flex-shrink:0}
.breadcrumb a{color:#6060a0;text-decoration:none}
.breadcrumb a:hover{color:#e8e8f5}
.breadcrumb .active{color:#a06bff;font-weight:700}
.breadcrumb .sep{font-size:10px;opacity:.5}

/* SCROLL AREA */
#scrollarea{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* WRAPPER */
.wrap{padding:12px 16px;display:flex;flex-direction:column;gap:12px}

/* LOADING */
.loading-state{text-align:center;padding:60px 20px;color:#6060a0}
.loading-spinner{width:40px;height:40px;border:3px solid #232338;border-top-color:#7b2fff;border-radius:50%;margin:0 auto 12px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{color:#ef4444;text-align:center;padding:40px}

/* MAIN CARD */
.main-card{background:#181826;border:1px solid #232338;border-radius:16px;overflow:hidden;animation:fadeUp .4s ease both}
.main-top{display:flex;gap:0}
.main-left{flex:1;padding:16px;border-right:1px solid #232338}
.badge-tier{display:inline-block;font-size:10px;font-weight:800;letter-spacing:1px;padding:3px 10px;border-radius:6px;margin-bottom:10px;text-transform:uppercase}
.tier-low{background:rgba(192,192,192,.15);color:#c0c0c0;border:1px solid rgba(192,192,192,.2)}
.tier-medium{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.2)}
.tier-high{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.tier-legend{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}

/* ID ROW DENGAN LIKE SEJAJAR */
.id-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.account-id{font-size:22px;font-weight:900;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.copy-btn{background:rgba(123,47,255,.15);border:1px solid rgba(123,47,255,.3);border-radius:6px;color:#a06bff;cursor:pointer;padding:3px 7px;font-size:11px;font-weight:700;transition:background .2s}
.copy-btn:hover{background:rgba(123,47,255,.3)}

/* LIKE BUTTON SEJAJAR DENGAN ID */
.like-btn-detail{background:rgba(123,47,255,.1);border:1px solid rgba(123,47,255,.2);border-radius:30px;padding:5px 12px;font-size:12px;font-weight:600;color:#e8e8f5;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.like-btn-detail:hover{background:rgba(123,47,255,.2);transform:scale(1.02)}
.like-btn-detail.liked{color:#a06bff;border-color:#a06bff}
.like-btn-detail.liked svg{fill:#a06bff;stroke:#a06bff}
.like-btn-detail svg{width:14px;height:14px}

.info-list{display:flex;flex-direction:column;gap:10px}
.info-row{display:flex;align-items:center;gap:8px;font-size:13px}
.info-row .icon-wrap{width:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#a06bff}
.info-row .label{color:#6060a0;font-size:12px;flex:1}
.info-row .value{font-weight:700;font-size:13px;text-align:right}
.rank-icon{width:20px;height:20px;object-fit:contain}

/* SISI KANAN - TOMBOL BAGIKAN */
.main-right{flex:0.5;padding:16px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.btn-share{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(123,47,255,.15);border:1.5px solid rgba(123,47,255,.3);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;font-family:'Rajdhani',sans-serif;color:#a06bff;cursor:pointer;transition:all .2s;width:100%}
.btn-share:hover{background:rgba(123,47,255,.25);border-color:#a06bff;transform:translateY(-1px)}
.btn-share svg{width:18px;height:18px}

/* SECTION CARD */
.section-card{background:#181826;border:1px solid #232338;border-radius:16px;padding:16px;animation:fadeUp .45s ease both}
.section-title{font-size:15px;font-weight:800;font-family:'Rajdhani',sans-serif;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid #232338;border-radius:12px;overflow:hidden}
.stat-cell{padding:12px 8px;text-align:center;border-right:1px solid #232338}
.stat-cell:last-child{border-right:none}
.stat-label{font-size:11px;color:#6060a0;margin-bottom:6px}
.stat-value{display:flex;align-items:center;justify-content:center;gap:5px;font-size:15px;font-weight:800;color:#a06bff;font-family:'Rajdhani',sans-serif}
.desc-text{font-size:13.5px;line-height:1.7;color:rgba(232,232,240,.75)}
.guarantee-list{display:flex;flex-direction:column;gap:12px}
.guarantee-item{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;line-height:1.5;color:#e8e8f5}
.guarantee-item svg{color:#22bb72;flex-shrink:0;margin-top:2px}
.note-card{background:rgba(123,47,255,.07);border:1px solid rgba(123,47,255,.2);border-radius:16px;padding:14px 16px;display:flex;gap:10px;align-items:flex-start}
.note-card svg{color:#a06bff;flex-shrink:0;margin-top:2px}
.note-title{font-size:13px;font-weight:800;margin-bottom:6px;color:#a06bff}
.note-text{font-size:12px;color:rgba(232,232,240,.7);line-height:1.6}

/* BOTTOM BAR */
.bottom-bar-outer{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,20,.92);backdrop-filter:blur(14px);border-top:1px solid #232338}
.bottom-bar-inner{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:16px}
.bottom-price{font-size:22px;font-weight:900;font-family:'Rajdhani',sans-serif;color:#a06bff;white-space:nowrap}
.btn-bottom{display:flex;align-items:center;justify-content:center;background:#7b2fff;color:#fff;border:none;border-radius:14px;padding:13px 22px;font-size:14px;font-weight:800;font-family:'Rajdhani',sans-serif;cursor:pointer;flex:1;transition:background .2s;box-shadow:0 4px 18px rgba(123,47,255,.4)}
.btn-bottom:hover{background:#5a1fd1}
.btn-bottom:disabled{opacity:0.5;cursor:not-allowed}

/* BOTTOM NAV */
#botnav{flex-shrink:0;background:rgba(14,14,26,.97);backdrop-filter:blur(16px);border-top:1px solid #1a1a2e;display:flex;justify-content:space-around;padding:7px 0 calc(7px + env(safe-area-inset-bottom));z-index:50}
.bni{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.58rem;color:#4040a0;cursor:pointer;padding:4px 8px;border-radius:9px;transition:.18s;text-decoration:none}
.bni:hover{color:#a06bff;background:rgba(123,47,255,.07)}
.bni.active{color:#a06bff}
.bni svg{width:19px;height:19px}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(34,187,114,.15);border:1px solid #22bb72;color:#22bb72;font-size:13px;font-weight:700;padding:9px 20px;border-radius:50px;opacity:0;pointer-events:none;transition:.25s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.warn{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@media (max-width:380px){
  .account-id{font-size:18px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .stat-cell:nth-child(2){border-right:none}
  .stat-cell:nth-child(3){border-top:1px solid #232338;border-right:1px solid #232338}
  .main-top{flex-direction:column}
  .main-left{border-right:none;border-bottom:1px solid #232338}
  .id-row{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div id="app">

<!-- TOP NAV -->
<nav id="topnav">
  <div class="logo">
    <div class="logo-mark"><img src="https://files.catbox.moe/eeimlh.png" alt="Lapak ID"></div>
  </div>
  <div class="nav-r">
    <div class="nav-icon" id="notifBtn" title="Notifikasi">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <div class="notif-badge" id="notifBadge"></div>
    </div>
  </div>
</nav>

<!-- NOTIF PANEL -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-head">
    <div class="notif-head-title">Aktivitas</div>
    <button class="notif-mark" onclick="markAllRead()">Tandai dibaca</button>
  </div>
  <div class="notif-list" id="notifList"><div class="notif-empty">Memuat...</div></div>
</div>

<!-- NOTIF DETAIL -->
<div class="nd-overlay" id="ndOverlay">
  <div class="nd-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700">Detail</div>
      <div class="modal-close" onclick="document.getElementById('ndOverlay').classList.remove('open')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
    </div>
    <div id="ndContent"></div>
  </div>
</div>

<!-- BREADCRUMB -->
<nav class="breadcrumb">
  <a href="index.html">Beranda</a>
  <span class="sep">›</span>
  <span class="active" id="breadcrumbId">Loading...</span>
</nav>

<!-- SCROLL AREA -->
<div id="scrollarea">
  <div class="wrap" id="mainContent">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div>Memuat detail ID...</div>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar-outer" id="bottomBar" style="display:none">
  <div class="bottom-bar-inner">
    <span class="bottom-price" id="bottomPrice">Rp 0</span>
    <button class="btn-bottom" id="buyBtn" onclick="beliSekarang()">Beli Sekarang</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav id="botnav">
  <a class="bni" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    Beranda
  </a>
  <a class="bni" href="transaksi.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    Transaksi
  </a>
</nav>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let currentIdData = null;
let settings = { prices: {} };
let likedSet = new Set(JSON.parse(localStorage.getItem('lapakid_liked') || '[]'));
let notifOpen = false;

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'rgba(239,68,68,.15)' : 'rgba(34,187,114,.15)';
  t.style.borderColor = isError ? '#ef4444' : '#22bb72';
  t.style.color = isError ? '#ef4444' : '#22bb72';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function formatRupiah(num) {
  return 'Rp ' + Number(num).toLocaleString('id-ID');
}

function getTierClass(tier) {
  const map = { low: 'tier-low', medium: 'tier-medium', high: 'tier-high', legend: 'tier-legend' };
  return map[tier] || 'tier-low';
}

function getTierName(tier) {
  const map = { low: 'Low', medium: 'Medium', high: 'High', legend: 'Legend' };
  return map[tier] || 'Low';
}

function getPrice(id) {
  if (id.price != null && id.price > 0) return id.price;
  if (settings.prices && settings.prices[id.tier]) return settings.prices[id.tier];
  return 0;
}

// ========== CEK TRANSAKSI PENDING ==========
async function checkPendingTransaction() {
  try {
    const res = await fetch(`${API}/transactions/check`);
    if (!res.ok) return false;
    const data = await res.json();
    return data.hasPending || false;
  } catch (e) {
    return false;
  }
}

// ========== NOTIFIKASI ==========
document.getElementById('notifBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  notifOpen = !notifOpen;
  document.getElementById('notifPanel').classList.toggle('open', notifOpen);
  if (notifOpen) loadNotifications();
});

document.addEventListener('click', (e) => {
  if (notifOpen && !document.getElementById('notifPanel').contains(e.target) && e.target !== document.getElementById('notifBtn')) {
    notifOpen = false;
    document.getElementById('notifPanel').classList.remove('open');
  }
});

async function loadNotifications() {
  try {
    const r = await fetch(`${API}/notifications?limit=20`);
    if (!r.ok) return;
    const d = await r.json();
    const badge = document.getElementById('notifBadge');
    if (d.unread > 0) {
      badge.textContent = d.unread > 99 ? '99+' : String(d.unread);
      badge.classList.add('show');
    } else {
      badge.classList.remove('show');
      badge.textContent = '';
    }
    
    const list = document.getElementById('notifList');
    if (!d.data || !d.data.length) {
      list.innerHTML = '<div class="notif-empty">Belum ada aktivitas</div>';
      return;
    }
    
    list.innerHTML = d.data.map(n => {
      const t = new Date(n.createdAt);
      const diff = Date.now() - t.getTime();
      const ts = diff < 60000 ? 'Baru saja' : diff < 3600000 ? Math.floor(diff / 60000) + ' mnt lalu' : diff < 86400000 ? Math.floor(diff / 3600000) + ' jam lalu' : t.toLocaleDateString('id-ID', {day:'2-digit', month:'short'});
      return `
        <div class="notif-item ${n.read ? '' : 'unread'}" onclick='openNotifDetail(${JSON.stringify(JSON.stringify(n))})'>
          <div class="notif-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div style="flex:1;min-width:0">
            <div class="notif-msg">${n.message}</div>
            <div class="notif-time">${ts}</div>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {}
}

function openNotifDetail(jsonStr) {
  const n = JSON.parse(jsonStr);
  document.getElementById('ndContent').innerHTML = `
    <div style="text-align:center;margin-bottom:12px">
      <div style="width:42px;height:42px;border-radius:50%;background:rgba(16,185,129,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 10px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;margin-bottom:5px">${n.title || 'Aktivitas'}</div>
      <div style="font-size:.68rem;color:#6060a0;line-height:1.6">${n.message}</div>
    </div>
    <div style="font-size:.56rem;color:#6060a0;text-align:center;margin-top:9px">${new Date(n.createdAt).toLocaleString('id-ID')}</div>
  `;
  document.getElementById('ndOverlay').classList.add('open');
}

async function markAllRead() {
  await fetch(`${API}/notifications/read`, { method: 'PUT' }).catch(() => {});
  const badge = document.getElementById('notifBadge');
  badge.classList.remove('show');
  badge.textContent = '';
  document.querySelectorAll('.notif-item.unread').forEach(el => el.classList.remove('unread'));
  loadNotifications();
}

// ========== BELI SEKARANG (DENGAN CEK PENDING) ==========
async function beliSekarang() {
  if (!currentIdData) return;
  if (currentIdData.sold) {
    showToast('❌ ID ini sudah terjual!', true);
    return;
  }
  
  // CEK APAKAH ADA TRANSAKSI PENDING
  const hasPending = await checkPendingTransaction();
  if (hasPending) {
    showToast('⚠️ Anda memiliki transaksi yang belum dikonfirmasi! Selesaikan pembayaran terlebih dahulu di halaman Transaksi.', true);
    // Tidak redirect, hanya notifikasi popup
    return;
  }
  
  // Jika tidak ada pending, lanjut ke payment
  showToast('🛒 Mengarahkan ke halaman pembayaran...');
  setTimeout(() => {
    window.location.href = `payment.html?id=${encodeURIComponent(currentIdData.number)}`;
  }, 500);
}

// ========== LOAD SETTINGS & ID ==========
async function loadSettings() {
  try {
    const res = await fetch(`${API}/settings`);
    if (res.ok) {
      const data = await res.json();
      settings = data.data || {};
    }
  } catch (e) { console.warn(e); }
}

async function loadIdDetail() {
  const urlParams = new URLSearchParams(window.location.search);
  const idNumber = urlParams.get('id');
  
  if (!idNumber) {
    document.getElementById('mainContent').innerHTML = '<div class="error-msg">❌ Tidak ada ID yang dipilih</div>';
    document.getElementById('bottomBar').style.display = 'none';
    return;
  }

  document.getElementById('breadcrumbId').textContent = idNumber;

  try {
    const res = await fetch(`${API}/ids/${encodeURIComponent(idNumber)}`);
    if (!res.ok) {
      if (res.status === 404) throw new Error('ID tidak ditemukan');
      throw new Error('Gagal memuat data');
    }
    const data = await res.json();
    currentIdData = data.data;
    renderDetail();
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `<div class="error-msg">❌ ${err.message}</div>`;
    document.getElementById('bottomBar').style.display = 'none';
  }
}

async function doLike() {
  if (!currentIdData) return;
  if (likedSet.has(currentIdData.number)) {
    showToast('Sudah menyukai ID ini', true);
    return;
  }
  
  const btn = document.getElementById('likeButtonDetail');
  if (btn) btn.disabled = true;
  
  try {
    const res = await fetch(`${API}/like/${currentIdData.number}`, { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      likedSet.add(currentIdData.number);
      localStorage.setItem('lapakid_liked', JSON.stringify([...likedSet]));
      if (btn) {
        btn.classList.add('liked');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${data.likes} Suka`;
        btn.disabled = false;
      }
      showToast('Berhasil menyukai!');
    } else {
      if (btn) btn.disabled = false;
      showToast(data.message || 'Gagal like', true);
    }
  } catch (err) {
    if (btn) btn.disabled = false;
    showToast('Gagal, coba lagi', true);
  }
}

function copyID() {
  if (!currentIdData) return;
  navigator.clipboard.writeText(currentIdData.number).then(() => {
    showToast('✓ ID berhasil disalin!');
  }).catch(() => {
    showToast('ID: ' + currentIdData.number);
  });
}

function bagikanID() {
  if (!currentIdData) return;
  const price = getPrice(currentIdData);
  const shareData = {
    title: 'LAPAK ID - ID Premium Free Fire',
    text: `ID Free Fire Premium: ${currentIdData.number} | Nickname: ${currentIdData.name || 'N4TAZAXXX'} | Harga: ${formatRupiah(price)}`,
    url: window.location.href
  };

  if (navigator.share) {
    navigator.share(shareData)
      .then(() => showToast('✓ Berhasil membagikan ID'))
      .catch((err) => {
        if (err.name !== 'AbortError') {
          showToast('Gagal membagikan', true);
        }
      });
  } else {
    const shareText = `${shareData.text}\n\nLihat detail: ${shareData.url}`;
    navigator.clipboard.writeText(shareText).then(() => {
      showToast('✓ Link dan info ID disalin! Silakan bagikan manual.');
    }).catch(() => {
      showToast('ID: ' + currentIdData.number, true);
    });
  }
}

// ========== INIT ==========
async function init() {

}

init();
