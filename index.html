<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>lapakID — Koleksi ID Premium</title>
<link rel="icon" type="image/png" href="https://files.catbox.moe/em51di.png"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9fafb;--bg2:#f2f4f7;--card:#fff;--border:#e4e7ec;--border2:#d0d5dd;
  --text:#101828;--muted:#667085;--muted2:#475467;
  --purple:#465fff;--purple2:#7c8eff;
  --low:#6b7280;--medium:#3b82f6;--high:#f97316;--legend:#eab308;--sold:#ef4444;
  --success:#12b76a;--warning:#f79009;--error:#ef4444;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:14px;
}
body.dark{--bg:#0d0d0d;--bg2:#151515;--card:#1a1a1a;--border:#252525;--border2:#2e2e2e;--text:#f5f5f5;--muted:#888;--muted2:#aaa}
body{background:var(--bg);color:var(--text);font-family:var(--font);transition:background .3s,color .3s}

/* NAV */
nav{position:sticky;top:0;z-index:200;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(249,250,251,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
@media(min-width:768px){nav{height:68px;padding:0 32px}}
body.dark nav{background:rgba(13,13,13,.95)}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:.9rem;font-weight:800;color:var(--text);text-decoration:none}
.logo-img{height:36px;width:auto;object-fit:contain}
.nav-links{display:flex;align-items:center;gap:6px}

/* DEBUG BUTTON */
.debug-btn{background:#ff4757;border:none;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:white;font-weight:bold;font-size:14px;transition:0.2s;}
.debug-btn:hover{background:#e8413c;transform:scale(0.95);}
.debug-btn.active{background:#2ed573;box-shadow:0 0 0 2px #2ed573;}

.theme-btn{background:var(--bg2);border:1px solid var(--border);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.theme-btn svg{width:14px;height:14px;stroke:var(--muted2);fill:none}

/* DEBUG PANEL */
.debug-panel{position:fixed;bottom:20px;left:20px;right:20px;z-index:10000;max-width:500px;background:#1e1e2f;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);border:1px solid #444;color:#eee;font-family:monospace;font-size:11px;transition:0.2s;opacity:0;transform:translateY(20px);pointer-events:none;}
.debug-panel.open{opacity:1;transform:translateY(0);pointer-events:all;}
.debug-header{background:#ff4757;padding:10px 14px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center;cursor:move;}
.debug-header span{font-weight:bold;color:white;font-size:12px;}
.debug-stats{display:flex;gap:12px;font-size:10px;}
.debug-stats .ok{color:#2ed573;}
.debug-stats .err{color:#ff4757;}
.debug-clear{background:#2f3542;border:none;color:#fff;padding:4px 12px;border-radius:8px;cursor:pointer;font-size:10px;}
.debug-content{height:280px;overflow-y:auto;padding:10px;background:#2f3542;border-radius:0 0 16px 16px;display:flex;flex-direction:column;gap:6px;}
.debug-log{background:#1e1e2f;padding:6px 10px;border-radius:6px;border-left:3px solid;font-size:10px;word-break:break-word;font-family:monospace;}
.debug-log.error{border-left-color:#ff4757;background:#ff475710;color:#ff9f9f;}
.debug-log.warn{border-left-color:#ffa502;background:#ffa50210;color:#ffd28f;}
.debug-log.info{border-left-color:#1e90ff;background:#1e90ff10;color:#a4d1ff;}
.debug-log.success{border-left-color:#2ed573;background:#2ed57310;color:#b8f2d0;}
.debug-log.http{border-left-color:#a855f7;background:#a855f710;color:#d8b4fe;}
.debug-time{color:#aaa;margin-right:8px;font-size:9px;}
.debug-url{color:#ffa502;font-size:9px;margin-top:2px;word-break:break-all;}

/* HERO & OTHER STYLES (disederhanakan) */
.hero{padding:40px 16px 24px;max-width:1400px;margin:0 auto}
.hero h1{font-size:2rem;font-weight:900;color:var(--text);margin-bottom:10px}
.hero h1 span{background:linear-gradient(135deg,var(--purple),var(--purple2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{color:var(--muted);font-size:.8rem;margin-bottom:24px}
.filter-sticky{position:sticky;top:60px;z-index:100;background:var(--bg);padding:10px 16px;border-bottom:1px solid var(--border)}
.filter-bar{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px}
.fb{background:var(--bg2);border:none;color:var(--muted2);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:.65rem;font-weight:600}
.fb.act{background:var(--purple);color:white}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:.72rem}
.result-info{font-size:.65rem;color:var(--muted)}
.ids-section{padding:12px 16px 80px;max-width:1400px;margin:0 auto}
.id-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.id-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer}
.id-card.is-sold{opacity:.5}
.id-num{font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:8px;word-break:break-all}
.id-tier{font-size:.5rem;font-weight:700;padding:2px 7px;border-radius:99px}
.id-bottom{display:flex;justify-content:space-between;align-items:center}
.like-btn{background:none;border:none;cursor:pointer;font-size:.58rem;color:var(--muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 18px;border-radius:99px;font-size:.68rem;z-index:9999}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">
    <img id="logoImg" src="https://files.catbox.moe/j4ittw.png" alt="lapakID" class="logo-img" style="height:32px"/>
  </a>
  <div class="nav-links">
    <button class="debug-btn" id="debugBtn">🐞</button>
    <div class="theme-btn" id="themeBtn"><svg id="themeIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></div>
  </div>
</nav>

<!-- DEBUG PANEL -->
<div class="debug-panel" id="debugPanel">
  <div class="debug-header" id="debugHeader">
    <span>🐞 Debug Console</span>
    <div class="debug-stats">
      <span class="ok" id="debugOkCount">OK:0</span>
      <span class="err" id="debugErrCount">ERR:0</span>
    </div>
    <button class="debug-clear" id="clearDebugBtn">Clear</button>
  </div>
  <div class="debug-content" id="debugLogs"></div>
</div>

<div class="hero">
  <h1>Temukan ID <span>Impianmu</span></h1>
  <p class="hero-sub">Koleksi ID premium pilihan. Beli dengan aman, bergaransi.</p>
</div>

<div class="filter-sticky" id="filterSticky">
  <div class="filter-bar" id="filterBar">
    <button class="fb act" data-f="all">Semua</button>
    <button class="fb" data-f="low">Low</button>
    <button class="fb" data-f="medium">Medium</button>
    <button class="fb" data-f="high">High</button>
    <button class="fb" data-f="legend">Legend</button>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Cari nomor ID..."/>
  </div>
  <div class="result-info" id="resultInfo">Memuat data...</div>
</div>

<div class="ids-section" id="gridContainer">
  <div class="empty-state">⏳ Memuat data ID...</div>
</div>

<footer style="text-align:center;padding:20px;border-top:1px solid var(--border);font-size:.6rem">
  &copy; 2026 lapakID
</footer>

<script>
// ==================== DEBUG SYSTEM LENGKAP ====================
let debugLogs = [];
let debugOpen = false;
let okCount = 0;
let errCount = 0;

function addDebugLog(type, message, details = null) {
  const time = new Date().toLocaleTimeString('id-ID');
  const logEntry = { time, type, message, details };
  debugLogs.unshift(logEntry);
  if (debugLogs.length > 150) debugLogs.pop();
  
  if (type === 'error') errCount++;
  if (type === 'success' || type === 'info') okCount++;
  
  updateDebugUI();
}

function updateDebugUI() {
  const container = document.getElementById('debugLogs');
  if (!container) return;
  
  container.innerHTML = debugLogs.map(log => {
    let detailHtml = '';
    if (log.details) {
      if (typeof log.details === 'object') {
        detailHtml = `<div class="debug-url">📦 ${JSON.stringify(log.details).substring(0, 200)}</div>`;
      } else {
        detailHtml = `<div class="debug-url">📝 ${String(log.details).substring(0, 200)}</div>`;
      }
    }
    return `<div class="debug-log ${log.type}">
      <span class="debug-time">[${log.time}]</span> ${log.message}
      ${detailHtml}
    </div>`;
  }).join('');
  
  document.getElementById('debugOkCount').innerHTML = `✓ ${okCount}`;
  document.getElementById('debugErrCount').innerHTML = `✗ ${errCount}`;
}

// Override fetch untuk capture semua request API
const originalFetch = window.fetch;
window.fetch = async function(...args) {
  const url = args[0];
  const options = args[1] || {};
  
  // Hanya log request ke /api/
  if (typeof url === 'string' && url.includes('/api/')) {
    addDebugLog('http', `🌐 REQUEST: ${options.method || 'GET'} ${url}`, { body: options.body });
  }
  
  try {
    const response = await originalFetch(...args);
    
    if (typeof url === 'string' && url.includes('/api/')) {
      const status = response.status;
      const statusText = response.statusText;
      
      // Clone response untuk dibaca
      const clone = response.clone();
      let responseText = '';
      try {
        const data = await clone.text();
        responseText = data.length > 300 ? data.substring(0, 300) + '...' : data;
      } catch(e) { responseText = 'Cannot read response'; }
      
      if (status >= 200 && status < 300) {
        addDebugLog('success', `✅ RESPONSE: ${status} ${url}`, responseText);
      } else {
        addDebugLog('error', `❌ RESPONSE: ${status} ${statusText} - ${url}`, responseText);
      }
    }
    
    return response;
  } catch(error) {
    if (typeof url === 'string' && url.includes('/api/')) {
      addDebugLog('error', `💥 FETCH ERROR: ${url} - ${error.message}`, error.stack);
    }
    throw error;
  }
};

// Override console.error
const originalError = console.error;
console.error = function(...args) {
  addDebugLog('error', args.join(' '));
  originalError.apply(console, args);
};
const originalWarn = console.warn;
console.warn = function(...args) {
  addDebugLog('warn', args.join(' '));
  originalWarn.apply(console, args);
};

// Global error handler
window.addEventListener('error', (e) => {
  addDebugLog('error', `Uncaught: ${e.message} at ${e.filename}:${e.lineno}`);
});
window.addEventListener('unhandledrejection', (e) => {
  addDebugLog('error', `Unhandled Rejection: ${e.reason}`);
});

addDebugLog('success', 'Debug system siap 🐞');
addDebugLog('info', 'Inisialisasi aplikasi dimulai');

// ==================== DATA & STATE ====================
const API = '/api';
let allIds = [];
let activeFilter = 'all';
let searchQ = '';
let settings = {};

// ==================== API CALLS DENGAN DEBUG LENGKAP ====================
async function loadSettings() {
  addDebugLog('info', 'Memuat settings dari /api/settings...');
  try {
    const r = await fetch(`${API}/settings`);
    addDebugLog('http', `Settings response status: ${r.status}`);
    
    if (!r.ok) {
      addDebugLog('error', `Settings gagal: HTTP ${r.status} ${r.statusText}`);
      return;
    }
    
    const text = await r.text();
    addDebugLog('http', `Settings raw response (200 chars): ${text.substring(0, 200)}`);
    
    let data;
    try {
      data = JSON.parse(text);
    } catch(e) {
      addDebugLog('error', `Settings JSON parse error: ${e.message}`, text.substring(0, 500));
      return;
    }
    
    settings = data.data || {};
    addDebugLog('success', `Settings berhasil dimuat`, { prices: settings.prices });
  } catch(e) {
    addDebugLog('error', `Settings exception: ${e.message}`, e.stack);
  }
}

async function loadIds() {
  addDebugLog('info', `Memuat ID dari /api/ids (filter: ${activeFilter}, search: "${searchQ}")...`);
  try {
    let url = `${API}/ids`;
    const params = new URLSearchParams();
    if (activeFilter !== 'all' && activeFilter !== 'sold') params.set('tier', activeFilter);
    if (searchQ) params.set('search', searchQ);
    if (params.toString()) url += '?' + params.toString();
    
    addDebugLog('http', `GET ${url}`);
    const r = await fetch(url);
    addDebugLog('http', `IDs response status: ${r.status}`);
    
    if (!r.ok) {
      addDebugLog('error', `IDs gagal: HTTP ${r.status} ${r.statusText}`);
      // Gunakan data dummy
      useDummyData();
      return;
    }
    
    const text = await r.text();
    addDebugLog('http', `IDs raw response (300 chars): ${text.substring(0, 300)}`);
    
    let data;
    try {
      data = JSON.parse(text);
    } catch(e) {
      addDebugLog('error', `IDs JSON parse error: ${e.message}`, text.substring(0, 500));
      useDummyData();
      return;
    }
    
    if (!data.success) {
      addDebugLog('error', `IDs API error: ${data.message || 'Unknown error'}`);
      useDummyData();
      return;
    }
    
    allIds = data.data || [];
    addDebugLog('success', `IDs berhasil dimuat: ${allIds.length} item`, { sample: allIds.slice(0, 2) });
    render();
    
  } catch(e) {
    addDebugLog('error', `IDs exception: ${e.message}`, e.stack);
    useDummyData();
  }
}

function useDummyData() {
  addDebugLog('warn', 'Menggunakan data dummy karena API error');
  allIds = [
    { number: "ID7654321", tier: "legend", sold: false, likes: 42, addedAt: new Date().toISOString(), note: "ID langka premium" },
    { number: "ID1234567", tier: "high", sold: false, likes: 28, addedAt: new Date().toISOString() },
    { number: "ID9876543", tier: "medium", sold: false, likes: 15, addedAt: new Date().toISOString() },
    { number: "ID5555555", tier: "low", sold: false, likes: 7, addedAt: new Date().toISOString() },
    { number: "ID1111111", tier: "legend", sold: true, likes: 31, addedAt: new Date().toISOString() },
    { number: "ID2222222", tier: "high", sold: false, likes: 19, addedAt: new Date().toISOString() },
    { number: "ID3333333", tier: "medium", sold: false, likes: 11, addedAt: new Date().toISOString() },
    { number: "ID4444444", tier: "low", sold: false, likes: 4, addedAt: new Date().toISOString() },
    { number: "IDabcdefg", tier: "legend", sold: false, likes: 56, addedAt: new Date().toISOString(), note: "NEW!" }
  ];
  render();
}

// Test endpoint API root
async function testApiConnection() {
  addDebugLog('info', '🔌 Testing API connection...');
  try {
    const r = await fetch('/api/ids?limit=1');
    addDebugLog('http', `Test API - Status: ${r.status} ${r.statusText}`);
    if (r.ok) {
      const text = await r.text();
      addDebugLog('success', `API merespon dengan status ${r.status}, response type: ${text.includes('{') ? 'JSON' : 'HTML/other'}`);
      if (text.includes('<!DOCTYPE') || text.includes('<html')) {
        addDebugLog('error', '⚠️ API mengembalikan HTML, bukan JSON! Pastikan Vercel routing benar.');
      }
    } else {
      addDebugLog('error', `API tidak merespon dengan baik: ${r.status}`);
    }
  } catch(e) {
    addDebugLog('error', `Test API gagal: ${e.message}`);
  }
}

// ==================== RENDER FUNCTION ====================
function render() {
  let filtered = allIds;
  
  // Filter tier
  if (activeFilter !== 'all') {
    filtered = filtered.filter(id => id.tier === activeFilter);
  }
  
  // Filter search
  if (searchQ) {
    filtered = filtered.filter(id => id.number.toLowerCase().includes(searchQ.toLowerCase()));
  }
  
  document.getElementById('resultInfo').innerHTML = `Menampilkan <b>${filtered.length}</b> ID dari ${allIds.length} total`;
  
  const container = document.getElementById('gridContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">😕 Tidak ada ID ditemukan</div>';
    return;
  }
  
  container.innerHTML = `
    <div class="id-grid">
      ${filtered.map(id => `
        <div class="id-card ${id.sold ? 'is-sold' : ''}" data-number="${id.number}">
          <div class="id-num">${id.number}</div>
          <div class="id-bottom">
            <span class="id-tier tier-${id.tier}">${id.tier.toUpperCase()}</span>
            <button class="like-btn" data-number="${id.number}">❤️ ${id.likes || 0}</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  
  // Attach event listeners
  document.querySelectorAll('.id-card:not(.is-sold)').forEach(card => {
    card.addEventListener('click', () => {
      addDebugLog('info', `Klik ID: ${card.dataset.number}`);
      alert(`Detail ID: ${card.dataset.number}\nTier: ${allIds.find(i => i.number === card.dataset.number)?.tier}\nLike: ${allIds.find(i => i.number === card.dataset.number)?.likes || 0}`);
    });
  });
  
  document.querySelectorAll('.like-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const number = btn.dataset.number;
      addDebugLog('info', `Like ID: ${number}`);
      
      try {
        const r = await fetch(`${API}/like/${number}`, { method: 'POST' });
        const data = await r.json();
        if (data.success) {
          const idx = allIds.findIndex(i => i.number === number);
          if (idx !== -1) allIds[idx].likes = data.likes;
          render();
          showToast(`👍 Berhasil menyukai ${number}!`);
          addDebugLog('success', `Like ${number} berhasil, total: ${data.likes}`);
        } else {
          showToast(data.message || 'Gagal like');
          addDebugLog('error', `Like gagal: ${data.message}`);
        }
      } catch(e) {
        addDebugLog('error', `Like error: ${e.message}`);
        showToast('Gagal, cek koneksi');
      }
    });
  });
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ==================== INITIALIZATION ====================
async function init() {
  addDebugLog('info', '🚀 Memulai inisialisasi aplikasi...');
  
  // Test API dulu
  await testApiConnection();
  
  // Load data
  await loadSettings();
  await loadIds();
  
  addDebugLog('success', '✅ Aplikasi siap digunakan!');
  addDebugLog('info', `Total data: ${allIds.length} ID`);
}

// Theme
function initTheme() {
  const dark = localStorage.getItem('lapakid_dark') === '1';
  if (dark) document.body.classList.add('dark');
  document.getElementById('themeBtn').addEventListener('click', () => {
    const dark = document.body.classList.toggle('dark');
    localStorage.setItem('lapakid_dark', dark ? '1' : '0');
  });
}

// Filter & Search
document.getElementById('filterBar').querySelectorAll('.fb').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.f;
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('act'));
    btn.classList.add('act');
    addDebugLog('info', `Filter berubah ke: ${activeFilter}`);
    loadIds(); // Reload dengan filter baru
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  addDebugLog('info', `Pencarian: "${searchQ || '(kosong)'}"`);
  loadIds();
});

// Debug panel
document.getElementById('debugBtn').addEventListener('click', () => {
  debugOpen = !debugOpen;
  document.getElementById('debugPanel').classList.toggle('open', debugOpen);
  if (debugOpen) addDebugLog('info', 'Debug panel dibuka');
});

document.getElementById('clearDebugBtn').addEventListener('click', () => {
  debugLogs = [];
  okCount = 0;
  errCount = 0;
  updateDebugUI();
  addDebugLog('success', 'Log dibersihkan');
});

// Make debug panel draggable
let isDragging = false, dragStartX, dragStartY, panelLeft, panelTop;
const debugPanel = document.getElementById('debugPanel');
const debugHeader = document.getElementById('debugHeader');

debugHeader.addEventListener('mousedown', (e) => {
  if (e.target.tagName === 'BUTTON') return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  const rect = debugPanel.getBoundingClientRect();
  panelLeft = rect.left;
  panelTop = rect.top;
  debugPanel.style.position = 'fixed';
  debugPanel.style.margin = '0';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  debugPanel.style.left = `${panelLeft + dx}px`;
  debugPanel.style.top = `${panelTop + dy}px`;
  debugPanel.style.right = 'auto';
  debugPanel.style.bottom = 'auto';
});

document.addEventListener('mouseup', () => { isDragging = false; });

// Start app
initTheme();
init();

addDebugLog('info', 'Script loaded, menunggu inisialisasi...');
</script>
</body>
</html>
